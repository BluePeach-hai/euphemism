seed: 12345
lr: 5.0e-6

trainer:
  gpus: 1
  max_epochs: 50
  precision: 16
  gradient_clip_val: 1.0
  val_check_interval: 1.0
  resume_from_checkpoint: null
  accumulate_grad_batches: 8
  num_sanity_val_steps: 0

# data module
data:
  batch_size: 8
  num_workers: 0
  seed: 42
  text_input: 'text'
  use_definitions: False
  use_images: False
  use_hallucinations: True
  val_percent: 0.2
  #max_seq_len: 128 #优化显存

# logger (tensorboard)
logger:
  name: stb_dfs_hallucinations_en
  version: 20260112_2047
  save_dir: E:/Classifier Guidance/euphemism/logs

# checkpoint
checkpoint:
  save_top_k: 1
  save_last: true
  verbose: true
  monitor: "f1"
  mode: "max"

# resume training
checkpoint_path: null

# hydra-specific
hydra:
  run:
    dir: .

defaults:
  - _self_
  - model: HallucinationBaseline #基线模型名
  - override hydra/job_logging: disabled